# Build `frontend/` and deploy to GitHub Pages on push to `master`.
#
# If you only see "Process completed with exit code 1":
#   Open the workflow run → click the **build** (or **deploy**) job name → expand **each step**
#   from the top. The first step with a red ✗ contains the real log; scroll that panel to the bottom.
#   Do not rely on the short summary line on the run overview.
#
# API URL/key: Repository Variables or Secrets named PUBLIC_API_URL / PUBLIC_API_KEY.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Print CI context (no secret values)
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || secrets.PUBLIC_API_URL }}
          PUBLIC_API_KEY: ${{ vars.PUBLIC_API_KEY || secrets.PUBLIC_API_KEY }}
        run: |
          set -eo pipefail
          echo "===== CI context ====="
          echo "node=$(node -v) npm=$(npm -v)"
          echo "repo=${GITHUB_REPOSITORY}"
          echo "SVELTEKIT_BASE_PATH for build: /${GITHUB_REPOSITORY#*/}"
          if [ -z "${PUBLIC_API_URL:-}" ]; then
            echo "::warning::PUBLIC_API_URL is empty — set Actions Variables or Secrets."
          else
            echo "PUBLIC_API_URL is set (length ${#PUBLIC_API_URL})"
          fi
          if [ -z "${PUBLIC_API_KEY:-}" ]; then
            echo "::warning::PUBLIC_API_KEY is empty."
          else
            echo "PUBLIC_API_KEY is set (length ${#PUBLIC_API_KEY})"
          fi
          echo "======================="

      - name: Install dependencies
        working-directory: frontend
        run: |
          set -eo pipefail
          echo ">>> npm ci (in frontend/)"
          test -f package.json || { echo "::error::frontend/package.json missing"; exit 1; }
          test -f package-lock.json || { echo "::error::frontend/package-lock.json missing"; exit 1; }
          npm ci

      - name: Build static site
        working-directory: frontend
        run: |
          set -eo pipefail
          echo ">>> npm run build"
          npm run build
        env:
          NODE_ENV: production
          SVELTEKIT_BASE_PATH: /${{ github.event.repository.name }}
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || secrets.PUBLIC_API_URL }}
          PUBLIC_API_KEY: ${{ vars.PUBLIC_API_KEY || secrets.PUBLIC_API_KEY }}

      - name: Verify Pages output
        run: |
          set -eo pipefail
          echo ">>> Checking frontend/build"
          if [ ! -d frontend/build ]; then
            echo "::error::Directory frontend/build does not exist after build."
            exit 1
          fi
          if [ ! -f frontend/build/index.html ]; then
            echo "::error::frontend/build/index.html is missing."
            echo "Contents of frontend/build:"
            ls -la frontend/build || true
            exit 1
          fi
          echo "OK: frontend/build/index.html exists"
          ls -la frontend/build | head -30

      - uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/build

      - name: Debug file tree (on failure)
        if: failure()
        run: |
          echo "=== repo root ==="
          ls -la
          echo "=== frontend ==="
          ls -la frontend || true
          echo "=== frontend/build (if any) ==="
          ls -la frontend/build 2>/dev/null || echo "(missing)"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
