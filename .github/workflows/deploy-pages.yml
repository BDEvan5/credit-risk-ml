# Build `frontend/` and deploy to GitHub Pages on push to `master`.
#
# Debugging a failed run:
#   1. GitHub → Actions → open the failed "Deploy to GitHub Pages" run.
#   2. Open the "build" job (red X). Expand each step from the top — the first red step is the failure.
#   3. Scroll to the bottom of that step’s log for the error (npm / vite / artifact).
#   4. Re-run with debug: Repo Settings → Actions → General → "Enable debug logging", then re-run jobs.
#
# API URL/key: use Repository Variables (Settings → Secrets and variables → Actions → Variables), OR
# use Repository Secrets with the same names — this workflow passes vars first, then secrets.
#
# Node 24: opt in so JavaScript-based actions (checkout, setup-node, deploy-pages, etc.) use Node 24
# on the runner before GitHub makes it the default (see GitHub Actions Node 20 deprecation changelog).

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Print CI context (no secret values)
        shell: bash
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || secrets.PUBLIC_API_URL }}
          PUBLIC_API_KEY: ${{ vars.PUBLIC_API_KEY || secrets.PUBLIC_API_KEY }}
        run: |
          set -euo pipefail
          echo "node=$(node -v) npm=$(npm -v)"
          echo "repo=${GITHUB_REPOSITORY}"
          echo "SVELTEKIT_BASE_PATH will be /${GITHUB_REPOSITORY#*/}"
          if [ -z "${PUBLIC_API_URL:-}" ]; then
            echo "::warning::PUBLIC_API_URL is empty. Set Actions Variables or Secrets (same name). Site will build but cannot call the API."
          else
            echo "PUBLIC_API_URL is set (length ${#PUBLIC_API_URL})"
          fi
          if [ -z "${PUBLIC_API_KEY:-}" ]; then
            echo "::warning::PUBLIC_API_KEY is empty."
          else
            echo "PUBLIC_API_KEY is set (length ${#PUBLIC_API_KEY})"
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static site
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          SVELTEKIT_BASE_PATH: /${{ github.event.repository.name }}
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || secrets.PUBLIC_API_URL }}
          PUBLIC_API_KEY: ${{ vars.PUBLIC_API_KEY || secrets.PUBLIC_API_KEY }}

      - name: Verify Pages output
        shell: bash
        run: |
          set -euo pipefail
          test -d frontend/build
          test -f frontend/build/index.html
          echo "OK: frontend/build contains index.html"
          ls -la frontend/build | head -30

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

      - name: Log tree on failure
        if: failure()
        run: |
          echo "=== frontend (top) ==="
          ls -la frontend || true
          echo "=== frontend/build ==="
          ls -la frontend/build 2>/dev/null || echo "(no build dir)"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
